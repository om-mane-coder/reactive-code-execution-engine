spring.application.name=sandbox-engine
# Exclude RabbitMQ autoconfiguration by default so local execution starts immediately without connection errors.
# To test with RabbitMQ broker, comment out the line below and make sure RabbitMQ is running.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
app.use-queue=false
server.port=8085
# Docker Host Connection: By default, the application auto-detects the Docker socket based on your OS.
# Uncomment one of the below if you need to override it:
# docker.host=unix:///var/run/docker.sock
# docker.host=npipe:////./pipe/docker_engine
# docker.host=npipe:////./pipe/dockerDesktopLinuxEngine
